<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>로뎀나무 CAFE</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="order-panel" aria-labelledby="app-title">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true">☕</span>
          <div>
            <h1 id="app-title">로뎀나무 CAFE</h1>
            <p>이름을 작성한 뒤 메뉴를 선택해주세요.</p>
          </div>
        </div>

        <form id="order-form" class="order-form">
          <label class="field">
            <span>이름</span>
            <input id="customer-name" name="customer-name" type="text" maxlength="20" autocomplete="name" placeholder="예: 민지" required />
          </label>

          <fieldset class="menu-field">
            <legend>메뉴</legend>
            <div id="menu-grid" class="menu-grid"></div>
          </fieldset>

          <fieldset class="delivery-field">
            <legend>수령 방법</legend>
            <div id="receive-options" class="choice-row"></div>
          </fieldset>

          <label id="delivery-location-field" class="field delivery-location" hidden>
            <span>희망 배달 장소</span>
            <input id="delivery-location" name="delivery-location" type="text" maxlength="40" placeholder="예: 고3-1 교실" />
          </label>

          <button id="submit-order" class="primary-button" type="submit">주문하기</button>
          <p id="form-message" class="form-message" role="status"></p>
        </form>

        <div id="closed-window" class="closed-window" hidden role="status" aria-live="polite">
          <strong>주문 마감</strong>
          <p>현재 로뎀나무 CAFE 주문이 마감되었습니다.</p>
        </div>

        <section class="customer-status-panel" aria-labelledby="customer-status-title">
          <div class="customer-status-header">
            <div>
              <h2 id="customer-status-title">주문 확인</h2>
              <p>접수된 주문의 진행 상태를 확인할 수 있습니다.</p>
            </div>
          </div>
          <div id="customer-order-list" class="customer-order-list" aria-live="polite"></div>
        </section>
      </section>

      <section class="cafe-panel" aria-labelledby="staff-title">
        <div id="staff-login" class="staff-login">
          <div>
            <h2 id="staff-title">직원 전용</h2>
            <p>비밀번호를 입력하면 대기 주문과 메뉴판을 관리할 수 있습니다.</p>
          </div>
          <form id="staff-login-form" class="staff-form">
            <label class="field">
              <span>직원 비밀번호</span>
              <input id="staff-password" name="staff-password" type="password" autocomplete="current-password" placeholder="비밀번호" required />
            </label>
            <button class="primary-button" type="submit">직원 화면 열기</button>
            <p id="staff-message" class="form-message" role="alert"></p>
          </form>
        </div>

        <div id="staff-dashboard" class="staff-dashboard" hidden>
          <div class="panel-header">
            <div>
              <h2 id="cafe-title">직원 관리</h2>
              <p id="order-count">대기 주문 0건</p>
              <p id="order-status" class="order-status">주문 가능</p>
            </div>
            <div class="staff-actions">
              <button id="toggle-open" class="close-orders-button" type="button">주문 마감</button>
              <button id="staff-logout" class="secondary-button" type="button">닫기</button>
            </div>
          </div>

          <div class="staff-tabs" role="tablist" aria-label="직원 메뉴">
            <button id="orders-tab" class="tab-button active" type="button" data-panel="orders-panel">주문 목록</button>
            <button id="menu-tab" class="tab-button" type="button" data-panel="menu-panel">메뉴판 수정</button>
          </div>

          <section id="orders-panel" class="staff-panel active" aria-labelledby="orders-tab">
            <div class="list-actions">
              <button id="clear-completed" class="secondary-button" type="button">완료 주문 정리</button>
              <button id="reset-orders" class="danger-button" type="button">전체 초기화</button>
            </div>
            <div id="order-list" class="order-list" aria-live="polite"></div>
          </section>

          <section id="menu-panel" class="staff-panel" aria-labelledby="menu-tab">
            <div class="editor-header">
              <div>
                <h3>메뉴판</h3>
                <p>손님 화면에 보이는 메뉴, 사진, 품절 여부를 수정합니다.</p>
              </div>
              <button id="add-menu" class="secondary-button" type="button">메뉴 추가</button>
            </div>

            <div id="menu-editor-list" class="menu-editor-list"></div>

            <div class="receive-editor">
              <h3>수령 방법</h3>
              <label class="switch-row">
                <input id="pickup-enabled" type="checkbox" />
                <span>픽업 사용</span>
              </label>
              <label class="switch-row">
                <input id="delivery-enabled" type="checkbox" />
                <span>배달 사용</span>
              </label>
            </div>

            <button id="save-menu-settings" class="primary-button" type="button">메뉴판 저장</button>
            <p id="menu-save-message" class="form-message" role="status"></p>
          </section>
        </div>
      </section>
    </main>

    <template id="order-template">
      <article class="order-card">
        <div>
          <p class="order-name"></p>
          <p class="order-menu"></p>
          <p class="order-time"></p>
        </div>
        <button class="complete-button" type="button"></button>
      </article>
    </template>

    <template id="menu-editor-template">
      <article class="menu-editor-card">
        <div class="menu-editor-preview" aria-hidden="true"></div>
        <div class="menu-editor-fields">
          <label class="field compact-field">
            <span>메뉴 이름</span>
            <input class="editor-menu-name" type="text" maxlength="30" placeholder="예: ICE 아메리카노" />
          </label>
          <label class="field compact-field">
            <span>설명</span>
            <input class="editor-menu-description" type="text" maxlength="40" placeholder="예: 차갑게, 깔끔하게" />
          </label>
          <label class="field compact-field">
            <span>사진 선택</span>
            <input class="editor-menu-file" type="file" accept="image/*" />
          </label>
          <label class="field compact-field">
            <span>사진 주소</span>
            <input class="editor-menu-image" type="text" placeholder="사진 선택 또는 https://..." />
          </label>
          <div class="menu-editor-actions">
            <label class="switch-row">
              <input class="editor-menu-soldout" type="checkbox" />
              <span>품절</span>
            </label>
            <button class="danger-button remove-menu" type="button">삭제</button>
          </div>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
